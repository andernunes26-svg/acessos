<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessos Rubinettos Group</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        /* Container ajustado para 3 em cima e 2 embaixo */
        .container { 
            display: flex; 
            gap: 40px 60px; 
            text-align: center; 
            align-items: center; 
            justify-content: center;
            flex-wrap: wrap; 
            max-width: 700px; /* Limita a largura para forçar a quebra no 4º item */
        }
        .card {
            text-decoration: none;
            transition: transform 0.2s ease;
            width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: translateY(-5px); }
        .logo-img { 
            max-width: 100%; 
            height: auto; 
            max-height: 65px;
            margin-bottom: 15px; 
        }
        .name { 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase; 
            color: #444; 
            letter-spacing: 1px; 
        }
    </style>
</head>
<body>

<div class="container">
    <a href="https://www.rubinettos.com.br" target="_blank" class="card">
        <img src="logo-rubinettos.png" class="logo-img">
        <div class="name">SITE RUBINETTOS</div>
    </a>

    <a href="https://www.krommametais.com.br/" target="_blank" class="card">
        <img src="logo-kromma.png" class="logo-img">
        <div class="name">SITE KROMMA</div>
    </a>

    <a href="https://www.dropmetais.com.br/" target="_blank" class="card">
        <img src="logo-drop.png" class="logo-img">
        <div class="name">SITE DROP</div>
    </a>

    <a href="https://indicadores.foccoerp.com.br/rubinettos" target="_blank" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1622/1622857.png" class="logo-img">
        <div class="name">FOCCO INDICADORES</div>
    </a>

    <a href="http://www.sintegra.gov.br/" target="_blank" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2910/2910795.png" class="logo-img">
        <div class="name">SINTEGRA</div>
    </a>
</div>

</body>
</html>
