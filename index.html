<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessos Rubinettos Group</title>
    <style>
        /* Estilos Globais e Centralização */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; /* Ocupa a altura total do frame */
            margin: 0;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }
        
        /* Contêiner dos Ícones */
        .container { 
            display: flex; 
            gap: 70px; /* Espaçamento entre as logos */
            text-align: center; 
            align-items: center;
        }
        
        /* Estilo de cada "Botão" (Link) */
        .card {
            text-decoration: none;
            color: #333;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 160px; /* Largura para acomodar a logo */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Efeito ao passar o mouse */
        .card:hover { 
            transform: translateY(-5px); /* Sobe levemente */
        }
        
        /* Estilo da Imagem da Logo */
        .logo-img { 
            max-width: 140px; /* Largura máxima da logo */
            max-height: 80px; /* Altura máxima da logo para manter proporção */
            width: auto;
            height: auto;
            margin-bottom: 20px; /* Espaço até o texto */
            display: block;
            /* Filtro opcional para dar um leve destaque */
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }
        
        /* Estilo do Texto da Label */
        .name { 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase; 
            color: #444; /* Cinza escuro profissional */
            letter-spacing: 1.2px; /* Espaçamento entre letras */
        }
    </style>
</head>
<body>

        <div class="name">SITE RUBINETTOS</div>
    </a>
