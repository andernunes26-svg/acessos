<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessos Rubinettos Group</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .container { display: flex; gap: 70px; text-align: center; align-items: center; }
        .card {
            text-decoration: none;
            transition: transform 0.2s ease;
            width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { transform: translateY(-5px); }
        .logo-img { 
            max-width: 100%; 
            height: auto; 
            margin-bottom: 20px; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }
        .name { 
            font-weight: bold; 
            font-size: 13px; 
            text-transform: uppercase; 
            color: #444; 
            letter-spacing: 1.2px; 
        }
    </style>
</head>
<body>

<div class="container">
    <a href="https://www.rubinettos.com.br" target="_blank" class="card">
        <img src="LOGO RUBINETTOS - PRETO.png" class="logo-img">
        <div class="name">SITE RUBINETTOS</div>
    </a>

    <a href="https://www.krommametais.com.br/" target="_blank" class="card">
        <img src="LOGO KROMMA METAIS - PRETO.png" class="logo-img">
        <div class="name">SITE KROMMA</div>
    </a>

    <a href="https://www.dropmetais.com.br/" target="_blank" class="card">
        <img src="LOGO DROP ESCRITA PRETO.png" class="logo-img">
        <div class="name">SITE DROP</div>
    </a>
</div>

</body>
</html>
